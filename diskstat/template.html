<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Disk Usage - __ROOT_NAME__</title>
<style>
:root {
  --bg:#0b0d10;--panel:#111418;--panel2:#1b1f26;--text:#e6e8eb;--muted:#7a8595;--line:#252b33;--accent:#0ea5e9;
}
* { box-sizing:border-box; }
html,body { height:100%; margin:0; background:var(--bg); color:var(--text); font:13px/1.4 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
header {
  position:sticky; top:0; z-index:10;
  background:#0d1117ee; backdrop-filter:saturate(140%) blur(6px);
  border-bottom:1px solid var(--line); padding:10px 16px 8px;
}
.h1 { margin:0 0 2px; font-size:15px; font-weight:600; }
.sub { color:var(--muted); font-size:11px; margin-bottom:6px; }
.legend { display:flex; flex-wrap:wrap; gap:4px 8px; margin:6px 0; }
.chip { display:inline-flex; align-items:center; gap:5px; background:var(--panel2); border:1px solid #222833;
        padding:2px 7px; border-radius:999px; font-size:10px; color:#cfd6e0; }
.dot { width:9px; height:9px; border-radius:50%; display:inline-block; border:1px solid #2a3140; }
.toolbar { display:flex; gap:8px; align-items:center; margin-top:4px; }
.toolbar input[type=text] { flex:1; padding:5px 8px; border-radius:5px; border:1px solid #2c333d;
  background:#0c1015; color:#e6e8eb; outline:none; font-size:12px; }
.wrap { display:grid; grid-template-columns:1fr 380px; gap:0; height:calc(100vh - 108px); }
#viz { overflow:hidden; background:var(--bg); }
aside { border-left:1px solid var(--line); background:var(--panel); padding:10px; overflow:auto; display:flex; flex-direction:column; gap:10px; }
.nav-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.breadcrumb { font-size:11px; color:var(--muted); word-break:break-all; flex:1; }
.btn { display:inline-flex; align-items:center; gap:4px; padding:4px 9px; border-radius:5px; border:1px solid #2c333d;
  background:var(--panel2); color:var(--text); font-size:11px; cursor:pointer; transition:background .12s; }
.btn:hover { background:#252b33; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
.stat-cell { background:var(--panel2); border:1px solid #1e2430; border-radius:5px; padding:5px 7px; }
.stat-cell .lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
.stat-cell .val { font-size:13px; font-weight:600; }
.ext-table { width:100%; border-collapse:collapse; }
.ext-table th { text-align:left; color:#9aa5b2; font-weight:500; font-size:10px; padding:3px 4px; border-bottom:1px solid #1d222b; }
.ext-table td { padding:3px 4px; font-size:11px; color:#cdd4de; border-bottom:1px solid #151a20; }
.ext-table tr:hover td { background:#0f1318; }
.ext-bar { height:3px; border-radius:2px; margin-top:2px; }
.file-section .title { font-size:11px; font-weight:600; color:var(--muted); margin-bottom:4px; }
.table { width:100%; border-collapse:collapse; }
.table th { text-align:left; color:#9aa5b2; font-weight:500; font-size:10px; padding:4px 3px; border-bottom:1px solid #1d222b; }
.table td { padding:4px 3px; border-top:1px solid #151a20; font-size:11px; color:#cdd4de; vertical-align:middle; }
.table tr:hover td { background:#0f1318; }
a { color:#bde0fe; text-decoration:none; }
.small { color:#7a8595; font-size:10px; }
.badge { display:inline-block; padding:0 5px; border-radius:999px; background:var(--panel2); border:1px solid #2a3140; font-size:9px; color:#9aa5b2; }
.pct { color:var(--muted); font-size:10px; }
.name-cell { max-width:170px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tooltip { position:fixed; background:#0f1418ee; border:1px solid #2a3140; padding:7px 9px; border-radius:7px;
  font-size:12px; pointer-events:none; opacity:0; transition:opacity .08s; max-width:440px; z-index:100; }
.actions { display:flex; gap:6px; flex-wrap:wrap; }
</style>
</head>
<body>

<header>
  <div class="h1">Disk Usage — __ROOT_NAME__</div>
  <div class="sub">__STATS_LINE__</div>
  <div class="legend" id="legend"></div>
  <div class="toolbar">
    <input type="text" id="filter" placeholder="Filter files by name or path…" autocomplete="off"/>
  </div>
</header>

<div class="wrap">
  <div id="viz"></div>
  <aside>
    <div class="nav-row">
      <button class="btn" id="btn-up" title="Go up one level">⬆ Up</button>
      <button class="btn" id="btn-root" title="Back to root">⏏ Root</button>
      <button class="btn" id="btn-reload" title="Reload">↻</button>
    </div>
    <div class="breadcrumb" id="breadcrumb">/</div>
    <div class="stat-grid" id="stat-grid"></div>
    <table class="ext-table">
      <thead><tr><th>Type</th><th>Size</th><th>%</th><th>#</th></tr></thead>
      <tbody id="ext-body"></tbody>
    </table>
    <div id="selection-info" class="small" style="color:var(--muted)"></div>
    <div class="actions" id="actions"></div>
    <div class="file-section">
      <div class="title" id="file-title">Files in: /</div>
      <table class="table">
        <thead><tr><th>Name</th><th>Size</th><th></th></tr></thead>
        <tbody id="tbl"></tbody>
      </table>
    </div>
  </aside>
</div>
<div class="tooltip" id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js" integrity="sha384-+8GY5eFqxN2ZSpPVBIs0a5yRhqIEX1MbNgxRmuh9gczeyr6Yls/0mSTKhS8ErPbVt" crossorigin="anonymous"></script>
<script>
// Injected data
const flat = __JS_FLAT__;
const colors = __JS_COLORS__;

function catColor(cat) { return colors[cat] || "#999"; }
function fmtBytes(n) {
  if (!n && n !== 0) return "…";
  if (n === 0) return "0 B";
  var u = ["B","KB","MB","GB","TB","PB"];
  var i = Math.min(u.length - 1, Math.floor(Math.log(n) / Math.log(1024)));
  return (n/Math.pow(1024,i)).toFixed(1)+" "+u[i];
}
function pctStr(part, total) {
  if (!total) return "0%";
  return (part/total*100).toFixed(1)+"%";
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Extension stats
function extStats(nodes) {
  var m = {};
  for (var i=0; i<nodes.length; i++) {
    var n = nodes[i];
    if (!n.size) continue;
    var cat = n.category || "unknown";
    if (!m[cat]) m[cat] = { size:0, count:0 };
    m[cat].size += n.size;
    m[cat].count++;
  }
  var total = 0;
  for (var k in m) total += m[k].size;
  var arr = [];
  for (var k in m) arr.push({ cat:k, size:m[k].size, count:m[k].count, total:total });
  arr.sort(function(a,b){ return b.size-a.size; });
  return arr;
}

// Legend
(function(){
  var el = document.getElementById("legend");
  el.innerHTML = "";
  var cats = Object.keys(colors);
  for (var i=0; i<cats.length; i++) {
    var c = cats[i];
    var s = document.createElement("span");
    s.className = "chip";
    s.innerHTML = '<span class="dot" style="background:'+catColor(c)+'"></span>'+c;
    el.appendChild(s);
  }
})();

// Index
var byName = {};
var byParent = {};
for (var i=0; i<flat.length; i++) {
  var n = flat[i];
  byName[n.name] = n;
  if (n.parent !== null && n.parent !== undefined) {
    if (!byParent[n.parent]) byParent[n.parent] = [];
    byParent[n.parent].push(n);
  }
}
function childrenOf(name) {
  var arr = byParent[name] || [];
  arr.sort(function(a,b){ return b.size - a.size; });
  return arr;
}

var ROOT_NAME = flat[0].name;
var historyStack = [ROOT_NAME];
var currentNode = ROOT_NAME;

// Render treemap
function renderViz(nodeName) {
  var kids = childrenOf(nodeName);
  if (!kids.length) {
    d3.select("#viz").html("").append("div")
      .style("display","flex").style("alignItems","center").style("justifyContent","center")
      .style("height","100%").style("color","#555").style("fontSize","14px")
      .text("(empty)");
    updateTable([]);
    document.getElementById("selection-info").textContent = "";
    document.getElementById("actions").innerHTML = "";
    return;
  }
  var total = 0;
  for (var i=0;i<kids.length;i++) total += kids[i].size;
  if (!total) total = 1;

  var vizEl = document.getElementById("viz");
  var width  = vizEl.clientWidth  || 800;
  var height = vizEl.clientHeight || 600;

  var root = d3.hierarchy({ name: nodeName, children: kids })
    .sum(function(d){ return d.size || 0; })
    .sort(function(a,b){ return b.value - a.value; });
  d3.treemap().size([width, height]).padding(1).tile(d3.treemapSquarify)(root);
  var leaves = root.leaves();

  var svg = d3.select("#viz").html("")
    .append("svg").attr("width", width).attr("height", height);

  var tooltip = document.getElementById("tooltip");
  var g = svg.selectAll("g").data(leaves).join("g")
    .attr("transform", function(d){ return "translate("+d.x0+","+d.y0+")"; });

  g.append("rect")
    .attr("width",  function(d){ return Math.max(0, d.x1-d.x0); })
    .attr("height", function(d){ return Math.max(0, d.y1-d.y0); })
    .attr("fill",   function(d){ return catColor(d.data.category||"unknown"); })
    .attr("stroke", "#0b0d10").attr("stroke-width", 0.5)
    .style("cursor", function(d){ return d.data.category==="folder"?"pointer":"default"; })
    .on("mousemove", function(e, d) {
      tooltip.style.opacity = "1";
      tooltip.style.left = (e.clientX+14)+"px";
      tooltip.style.top  = (e.clientY+14)+"px";
      tooltip.innerHTML = "<b>"+esc(d.data.name)+"</b><br/>"+fmtBytes(d.data.size)+"&nbsp;&nbsp;("+pctStr(d.data.size,total)+")<br/><span style='color:#8b97a6;font-size:11px'>"+esc(d.data.path||"")+"</span>";
    })
    .on("mouseleave", function(){ tooltip.style.opacity = "0"; })
    .on("click", function(e, d) {
      e.stopPropagation();
      if (d.data.category === "folder") {
        navigateTo(d.data.name);
      } else {
        showFileActions(d.data);
      }
    });

  g.append("text")
    .attr("x", 3).attr("y", 13)
    .attr("fill", "#fff").attr("font-size", 10)
    .style("pointer-events","none")
    .style("text-shadow","0 1px 3px rgba(0,0,0,.9)")
    .text(function(d){
      var w = d.x1 - d.x0;
      var h = d.y1 - d.y0;
      if (w < 30 || h < 12) return "";
      var t = d.data.name;
      var max = Math.max(3, Math.floor((w-6)/6.5));
      return t.length > max ? t.slice(0,max-1)+"…" : t;
    });

  updateTable(kids, total);
  showFileActions(null);
}

// Navigation
function navigateTo(name) {
  if (name === currentNode) return;
  historyStack.push(name);
  currentNode = name;
  updateBreadcrumb();
  renderViz(name);
}

function navigateUp() {
  if (historyStack.length <= 1) return;
  historyStack.pop();
  currentNode = historyStack[historyStack.length-1];
  updateBreadcrumb();
  renderViz(currentNode);
}

function navigateRoot() {
  historyStack = [ROOT_NAME];
  currentNode = ROOT_NAME;
  updateBreadcrumb();
  renderViz(currentNode);
}

function updateBreadcrumb() {
  var node = byName[currentNode] || {};
  document.getElementById("breadcrumb").textContent = node.path || currentNode;
  document.getElementById("file-title").textContent = "Files in: " + (node.path || currentNode);
}

// File table
function updateTable(kids, total) {
  if (!total) {
    total = 0;
    for (var i=0;i<kids.length;i++) total += kids[i].size;
    if (!total) total = 1;
  }
  var rows = kids.slice().sort(function(a,b){ return b.size-a.size; });
  var q = document.getElementById("filter").value.trim().toLowerCase();
  if (q) {
    rows = rows.filter(function(r){
      return (r.name+" "+(r.path||"")).toLowerCase().indexOf(q) !== -1;
    });
  }
  rows = rows.slice(0, 200);
  var tb = document.getElementById("tbl");
  tb.innerHTML = "";
  for (var i=0; i<rows.length; i++) {
    var r = rows[i];
    var tr = document.createElement("tr");
    var nameHref = "javascript:handleRowClick("+JSON.stringify(r.name)+",\""+r.category+"\")";
    tr.innerHTML =
      '<td><span class="dot" style="background:'+catColor(r.category)+'"></span><div class="name-cell"><a href="'+nameHref+'">'+esc(r.name)+'</a></div><div class="small">'+esc(r.path||"")+'</div></td>' +
      '<td style="white-space:nowrap">'+fmtBytes(r.size)+' <span class="pct">'+pctStr(r.size,total)+'</span></td>' +
      '<td><span class="badge">'+r.category+'</span></td>';
    tb.appendChild(tr);
  }
}

function handleRowClick(name, cat) {
  if (cat === "folder") {
    navigateTo(name);
  } else {
    var n = byName[name];
    if (n) showFileActions(n);
  }
}

// Actions
function showFileActions(node) {
  var infoEl = document.getElementById("selection-info");
  var actEl  = document.getElementById("actions");
  if (!node) { infoEl.textContent = ""; actEl.innerHTML = ""; return; }
  infoEl.innerHTML = "<b>"+esc(node.name)+"</b> &mdash; "+fmtBytes(node.size)+" &mdash; <span class=\"badge\">"+node.category+"</span><br/><span class=\"small\">"+esc(node.path||"")+"</span>";
  actEl.innerHTML = "";
  if (node.path) {
    var b1 = document.createElement("button");
    b1.className = "btn";
    b1.textContent = "\uD83D\uDCC2 Open folder";
    b1.onclick = function(){ window.open("file://"+node.path, "_blank"); };
    actEl.appendChild(b1);
    var b2 = document.createElement("button");
    b2.className = "btn";
    b2.textContent = "\uD83D\uDCCB Copy path";
    b2.onclick = function(){ navigator.clipboard.writeText(node.path); b2.textContent = "Copied!"; };
    actEl.appendChild(b2);
  }
}

// Sidebar stats
function buildSidebarStats() {
  var grid = document.getElementById("stat-grid");
  var all = flat.filter(function(n){ return n.parent!==null; });
  var totalSize = 0;
  for (var i=0;i<all.length;i++) totalSize += all[i].size||0;
  var totalFiles = all.filter(function(n){ return n.category!=="folder"; }).length;
  var totalDirs = all.filter(function(n){ return n.category==="folder"; }).length;
  var extSet = {};
  for (var i=0;i<all.length;i++) extSet[all[i].category||"unknown"] = true;
  grid.innerHTML =
    '<div class="stat-cell"><div class="lbl">Total</div><div class="val">'+fmtBytes(totalSize)+'</div></div>' +
    '<div class="stat-cell"><div class="lbl">Files</div><div class="val">'+totalFiles.toLocaleString()+'</div></div>' +
    '<div class="stat-cell"><div class="lbl">Folders</div><div class="val">'+totalDirs.toLocaleString()+'</div></div>' +
    '<div class="stat-cell"><div class="lbl">Types</div><div class="val">'+Object.keys(extSet).length+'</div></div>';
}

function buildExtTable() {
  var all = flat.filter(function(n){ return n.parent!==null; });
  var total = 0;
  for (var i=0;i<all.length;i++) total += all[i].size||0;
  if (!total) total = 1;
  var stats = extStats(all).slice(0, 20);
  var tbody = document.getElementById("ext-body");
  tbody.innerHTML = "";
  for (var i=0; i<stats.length; i++) {
    var s = stats[i];
    var tr = document.createElement("tr");
    var pct = pctStr(s.size, total);
    tr.innerHTML =
      '<td><span class="dot" style="background:'+catColor(s.cat)+'"></span> '+s.cat+'</td>' +
      '<td style="white-space:nowrap">'+fmtBytes(s.size)+'</td>' +
      '<td>'+pct+'<div class="ext-bar" style="width:'+pct+';background:'+catColor(s.cat)+'"></div></td>' +
      '<td>'+s.count+'</td>';
    (function(cat){ tr.onclick = function(){ showFilesByCategory(cat); }; })(s.cat);
    tbody.appendChild(tr);
  }
}

function showFilesByCategory(cat) {
  var nodes = flat.filter(function(n){ return n.category===cat && n.parent!==null; }).slice(0,200);
  document.getElementById("file-title").textContent = "Files: " + cat;
  var tot = 0;
  for (var i=0;i<nodes.length;i++) tot += nodes[i].size||0;
  if (!tot) tot = 1;
  var tb = document.getElementById("tbl");
  tb.innerHTML = "";
  for (var i=0; i<nodes.length; i++) {
    var r = nodes[i];
    var tr = document.createElement("tr");
    tr.innerHTML =
      '<td><div class="name-cell"><a href="javascript:void(0)">'+esc(r.name)+'</a></div><div class="small">'+esc(r.path||"")+'</div></td>' +
      '<td style="white-space:nowrap">'+fmtBytes(r.size)+' <span class="pct">'+pctStr(r.size,tot)+'</span></td>';
    (function(node){ tr.onclick = function(){ showFileActions(node); }; })(r);
    tb.appendChild(tr);
  }
}

// Init
buildSidebarStats();
buildExtTable();
updateBreadcrumb();
renderViz(currentNode);

document.getElementById("btn-up").onclick    = navigateUp;
document.getElementById("btn-root").onclick  = navigateRoot;
document.getElementById("btn-reload").onclick = function(){ location.reload(); };
document.getElementById("filter").addEventListener("input", function(){ renderViz(currentNode); });
window.addEventListener("resize", function(){ renderViz(currentNode); });
</script>
</body>
</html>
